<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Kingdom Guard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <!-- ===== MENU ===== -->
    <div id="scr-menu" class="screen">
      <div class="menu-glow"></div>
      <button id="muteBtn" class="corner-btn">🔊</button>
      <div class="menu-logo">KINGDOM<br><span>GUARD</span></div>
      <div class="menu-sub">Place towers · survive the waves · defend the crystal</div>
      <button id="playBtn" class="menu-btn play">▶ PLAY</button>
      <button id="rankBtn" class="menu-btn rank">🏆 RANKING</button>
      <div class="menu-you">You: <b id="menuNick">— tap to set —</b></div>
    </div>

    <!-- ===== LEVEL SELECT ===== -->
    <div id="scr-levels" class="screen hidden">
      <div class="scr-top"><button id="lvlBack" class="back">‹</button><div class="scr-title">SELECT MAP</div><div style="width:56px"></div></div>
      <div id="lvlGrid" class="lvl-grid"></div>
    </div>

    <!-- ===== GAME HUD ===== -->
    <div id="scr-game" class="screen hidden game-ui">
      <div id="hud">
        <button id="pauseBtn" class="hud-btn">≡</button>
        <div class="stat"><span>❤️</span><span id="lives">20</span></div>
        <div class="stat"><span>🪙</span><span id="gold">130</span></div>
        <div class="stat"><span>🌊</span><span id="wave">0/12</span></div>
        <button id="muteBtn2" class="hud-btn">🔊</button>
      </div>
      <div id="bottombar">
        <button id="startBtn" class="big">▶ START WAVE</button>
        <button id="speedBtn" class="small">1×</button>
      </div>
      <div id="buildSheet" class="sheet hidden">
        <div class="sheet-title">Build Tower</div>
        <div class="towers" id="towerList"></div>
        <button class="sheet-close" id="buildClose">✕</button>
      </div>
      <div id="manageSheet" class="sheet hidden">
        <div class="sheet-title" id="mgTitle">Tower</div>
        <div id="mgInfo" class="mg-info"></div>
        <div class="mg-actions">
          <button id="upgradeBtn" class="act up">⬆ Upgrade</button>
          <button id="sellBtn" class="act sell">Sell</button>
        </div>
        <button class="sheet-close" id="manageClose">✕</button>
      </div>
    </div>

    <!-- ===== RESULT OVERLAY ===== -->
    <div id="overlay" class="overlay hidden">
      <div class="ov-card">
        <div id="ovTitle" class="ov-title">VICTORY!</div>
        <div id="ovStars" class="ov-stars hidden"></div>
        <div id="ovSub" class="ov-sub"></div>
        <div class="ov-btns">
          <button id="ovNext" class="ov-btn next">NEXT MAP ▶</button>
          <button id="ovBtn" class="ov-btn">RETRY</button>
          <button id="ovMenu" class="ov-btn ghost">MAPS</button>
        </div>
      </div>
    </div>

    <!-- ===== RANKING ===== -->
    <div id="scr-rank" class="screen hidden">
      <div class="scr-top"><button id="rankBack" class="back">‹</button><div class="scr-title">🏆 RANKING</div><button id="rankRefresh" class="back">⟳</button></div>
      <div id="rankStatus" class="rank-status">Loading…</div>
      <div id="rankList" class="rank-list"></div>
    </div>

    <!-- ===== NICKNAME MODAL ===== -->
    <div id="nickModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-title">Enter your name</div>
        <div class="modal-sub">Appear on the global leaderboard</div>
        <input id="nickInput" maxlength="12" placeholder="e.g. DragonKing" autocomplete="off" />
        <button id="nickSave" class="menu-btn play">SAVE</button>
      </div>
    </div>
  </div>
  <script src="sound.js"></script>
  <script src="lb.js"></script>
  <script src="game.js"></script>
</body>
</html>
